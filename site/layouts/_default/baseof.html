<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ block "title" . }}{{ .Title }} | 🪨 Caveman News{{ end }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; line-height: 1.6; color: #2a1f0e; max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; background: #fdfaf5; }
    h1, h2, h3 { margin: 1.5rem 0 0.75rem; }
    h1 { font-size: 1.75rem; border-bottom: 2px solid #7a5c2e; padding-bottom: 0.5rem; }
    h2 { font-size: 1.2rem; }
    h2 a { color: #2a1f0e; }
    a { color: #7a3b00; text-decoration: none; }
    a:hover { text-decoration: underline; }
    hr { border: none; border-top: 1px solid #d9c9a8; margin: 1.5rem 0; }
    time { color: #7a6a50; font-size: 0.875rem; }
    .source { color: #9a8060; font-size: 0.85rem; font-style: italic; margin-bottom: 0.5rem; }
    article { margin-bottom: 2rem; }
    .back-link { margin-bottom: 1.5rem; }
    .intro { color: #6a5a40; margin-bottom: 1.5rem; }
    .post-date { color: #9a8060; font-size: 0.8rem; margin-right: 0.5rem; }
    footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #d9c9a8; color: #9a8060; font-size: 0.8rem; text-align: center; }

    .hub { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; margin-top: 2rem; }
    @media (max-width: 768px) { .hub { grid-template-columns: 1fr; } }
    .hub-section { border: 1px solid #d9c9a8; border-radius: 6px; padding: 1.25rem; background: #fff; }
    .hub-section h2 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid #d9c9a8; padding-bottom: 0.5rem; margin-bottom: 1rem; }
    .hub-section h2 a { color: #2a1f0e; }
    .hub-section p.desc { color: #6a5a40; font-size: 0.85rem; margin-bottom: 1rem; }
    .hub-section ul { list-style: none; padding: 0; }
    .hub-section ul li { margin-bottom: 0.6rem; font-size: 0.9rem; }
    .hub-section ul li a { color: #7a3b00; }
    .hub-section ul li .post-date { display: block; color: #9a8060; font-size: 0.75rem; }
    .hub-section .view-all { display: inline-block; margin-top: 1rem; font-size: 0.85rem; }

    .section-list article { margin-bottom: 1rem; }
  </style>
</head>
<body>
  {{ block "main" . }}
  {{ end }}
  <script>
    var el = document.querySelector('.home-back-link');
    if (el) { el.href = window.location.origin + '/caveman-news-local/'; }
  </script>
  <footer>
    <p>🪨 Caveman News — UGG MAKE NEWS EVERY MORNING. GitHub Copilot SDK do heavy lifting.</p>
  </footer>
</body>
</html>
