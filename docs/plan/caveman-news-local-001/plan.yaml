  - id: T4
    title: LLM summariser module — llm.py with GitHub Copilot SDK and Ugg caveman prompt
    description: |
      Create llm.py implementing async summarise(text) using the GitHub Copilot SDK.

      Implementation:
      - Imports:
          import asyncio
          from copilot import CopilotClient
          from copilot.generated.session_events import AssistantMessageData, SessionIdleData

      - MODEL = "gpt-5-mini"

      - PROMPT prefix (prepended to the article text in session.send()):
          "You are Ugg, a caveman reporter. Summarise this AI news article in caveman-speak: "
          "ultra-compressed grunts, short phrases, use words like UGH, FIRE GOOD, BIG BRAIN, "
          "MANY STONE, SMASH, NO GOOD, UNGA BUNGA. Max 120 words. Keep it funny and accurate.\n\n"

      - async def summarise(text: str) -> str:
          result_parts = []
          done = asyncio.Event()

          try:
              async with CopilotClient() as client:
                  async with await client.create_session(model=MODEL) as session:
                      def on_event(event):
                          match event.data:
                              case AssistantMessageData() as data:
                                  result_parts.append(data.content)
                              case SessionIdleData():
                                  done.set()

                      session.on(on_event)
                      await session.send(PROMPT_PREFIX + text)
                      await done.wait()

              return "".join(result_parts) or "[UGH. UGG NO GET SUMMARY.]"
          except Exception as e:
              import logging
              logging.warning(f"LLM summarise failed: {e}")
              return "[UGH. UGG NO GET SUMMARY.]"

      - No API key, no env vars, no rate-limit sleep, no time.sleep() calls.
      - Do NOT import rss_sources or scrape_sources from this module.
