  - id: T6
    title: Cron installer — setup_cron.sh for macOS 9:30am daily run
    description: |
      Create setup_cron.sh that installs the crontab entry to run fetch.py daily at 9:30am.

      Implementation:
      1. Resolve uv path:
           UV_PATH=$(which uv)
           If empty: echo "ERROR: uv not found on PATH. Install uv first." && exit 1
      2. Hard-code repo dir:
           REPO_DIR="/Users/sha.cheng/Projects/caveman-news-local"
      3. Ensure logs/ dir exists:
           mkdir -p "$REPO_DIR/logs"
      4. Build cron line:
           CRON_LINE="30 9 * * * cd $REPO_DIR && $UV_PATH run python fetch.py >> $REPO_DIR/logs/cron.log 2>&1"
         NOTE: No GITHUB_TOKEN or .env reference in the cron line. CopilotClient uses
         the logged-in gh credentials automatically — no env var injection needed.
      5. Idempotency check:
           if crontab -l 2>/dev/null | grep -q "caveman-news-local"; then
             echo "Cron already installed. Nothing changed." && exit 0
           fi
      6. Install:
           (crontab -l 2>/dev/null || true; echo "$CRON_LINE") | crontab -
      7. Verify and report:
           echo "Installed crontab entry:"
           crontab -l | grep "caveman-news-local"
           echo "✅ Cron installed: daily at 9:30am"

      Make the script self-sufficient with #!/usr/bin/env bash at top and set -e.
      Do NOT read or reference .env, GITHUB_TOKEN, or any API credentials.
      Do NOT modify any Python files.
