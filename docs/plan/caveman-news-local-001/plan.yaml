  - id: T5
    title: Main orchestrator — fetch.py (fetch + deduplicate + summarise + write .md + git push)
    description: |
      Create fetch.py as the async entrypoint tying all modules together.

      Implementation (in async main() function):

      1. LOGGING
         Configure logging.basicConfig(level=logging.INFO, format="%(asctime)s %(levelname)s %(message)s")

      2. FETCH ALL SOURCES
         rss_articles = rss_sources.fetch_rss_articles()
         scraped_articles = scrape_sources.fetch_scraped_articles()
         all_articles = rss_articles + scraped_articles

      3. DEDUPLICATE BY URL
         seen_path = Path(".seen_urls.json")
         Load seen_urls set from seen_path (json.loads); default to {} on missing or corrupt file.
         new_articles = [a for a in all_articles if a["url"] not in seen_urls]
         Log: f"Fetched {len(all_articles)} articles. {len(new_articles)} new."

      4. SUMMARISE (async)
         For each article in new_articles:
           article["summary"] = await llm.summarise(article["content_snippet"])

      5. WRITE OUTPUT FILE
         now = datetime.now()
         filename = f"news/{now.strftime('%Y-%m-%d-%H-%M-%S')}.md"
         Header:
           "# 🪨 Caveman News — {now.strftime('%Y-%m-%d %H:%M:%S')}\n\n"
           "_Ugg bring news from stone age. Many words. Big brain. Sit. Read._\n\n"
         Group new_articles by source name (preserve insertion order using dict).
         For each source group:
           "## {source_name}\n\n"
           For each article in group:
             "### [{title}]({url})\n\n{summary}\n\n---\n\n"
         If len(new_articles) == 0:
           Write: "# 🪨 Caveman News — {date}\n\n_UGH. NO NEW NEWS TODAY. UGG SAD._\n"
         Write file UTF-8.

      6. UPDATE SEEN URLS
         Add all new article URLs to seen_urls dict (url → date string).
         Save back to seen_path as JSON.

      7. GIT ADD / COMMIT / PUSH
         run_git("add", "news/")
         run_git("commit", "-m", f"🪨 caveman news {now.strftime('%Y-%m-%d %H:%M:%S')}")
         run_git("push")
         Where run_git() uses subprocess.run, captures returncode, logs ERROR if != 0.

      8. DONE LOG
         print(f"Ugg done. {len(new_articles)} new articles. File: {filename}")

      Entry point:
         if __name__ == "__main__":
             asyncio.run(main())

      NO load_dotenv(), NO GITHUB_TOKEN references anywhere.
      All imports at top of file: stdlib → third-party → local modules.
