plan_id: caveman-news-local-001
objective: |
  Build a local Python-based AI news aggregator that fetches AI news from 8 major sources
  (RSS + web scraping), summarises each article in caveman-speak via the GitHub Copilot SDK
  (gpt-5-mini, no API key required — uses logged-in Copilot credentials), writes a
  consolidated yyyy-mm-dd-hh-mm-ss.md file per run to news/, auto git-commits and pushes,
  and runs daily at 9:30am via macOS crontab.
created_at: "2025-07-16T00:00:00Z"
created_by: gem-planner
status: pending
research_confidence: high

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 9
  risk_score: low

tldr: |
  7-task, 5-wave DAG. Wave 1 scaffolds the project (T1 alone). Wave 2 builds the RSS fetch
  module, web scraping (Anthropic + Mistral only), and LLM summariser in parallel (T2+T3+T4).
  Wave 3 assembles the fetch.py orchestrator (T5). Wave 4 installs the macOS cron job (T6).
  Wave 5 writes the full README after both orchestrator and cron script are complete (T7).
  Git + cron handled by gem-devops; docs by gem-documentation-writer; code by gem-implementer.

open_questions: []

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: Copilot not logged in or no active Copilot subscription when summarise() is called
      likelihood: medium
      impact: medium
      mitigation: |
        CopilotClient raises an auth error if `gh auth login` has not been run or the user
        lacks an active Copilot subscription. Wrap every session in try/except; return fallback
        string "[UGH. UGG NO GET SUMMARY.]" and log WARNING. README prominently documents
        `gh auth login` as a prerequisite. Never crash the run on auth failure.
    - scenario: Scraping targets (Anthropic, Mistral) change their HTML structure or return 4xx
      likelihood: medium
      impact: low
      mitigation: |
        Wrap each scraper in isolated try/except. Log "0 articles found for {source}" so it
        is visible in cron.log. Run continues with remaining sources. Selectors are isolated
        per-source function so fixes are surgical.
    - scenario: git push fails (no network, SSH key missing, expired credentials)
      likelihood: low
      impact: low
      mitigation: |
        Capture subprocess return code. Log ERROR but do NOT raise — the .md file is already
        written locally. User sees the failure in logs/cron.log.
    - scenario: crontab PATH is minimal; uv / python not found at runtime
      likelihood: medium
      impact: medium
      mitigation: |
        setup_cron.sh resolves the full absolute path to uv via `which uv` and hard-codes it
        in the crontab line. No env var injection needed — CopilotClient uses gh credentials
        automatically. README documents the PATH requirement explicitly.
  assumptions:
    - User has run `gh auth login` and has an active GitHub Copilot subscription
    - github-copilot-sdk is installed via `uv sync` (declared in pyproject.toml)
    - uv is installed at a stable absolute path on the host machine
    - Python 3.11+ is available via uv's managed virtual environment
    - caveman-news-local repo is already git-initialised with a remote origin configured
    - Internet access is available at 9:30am when cron fires
    - All 8 news sources are publicly accessible without authentication
    - xAI (403) and Meta AI (JS SPA) are explicitly excluded from scrape_sources.py

implementation_specification:
  code_structure: |
    Flat single-directory layout. One entrypoint (fetch.py), three pure helper modules
    (rss_sources.py, scrape_sources.py, llm.py), and one shell script (setup_cron.sh).
    No sub-packages are needed at this scale. pyproject.toml + uv manages the virtual
    environment. .seen_urls.json provides cross-run deduplication state (gitignored).
  affected_areas:
    - caveman-news-local/ (repo root — all new files live here)
    - caveman-news-local/news/ (runtime output; git-tracked via .gitkeep)
    - caveman-news-local/logs/ (runtime log directory; gitignored)
  component_details:
    - component: pyproject.toml
      responsibility: Declare Python 3.11+ project metadata and all runtime dependencies.
      interfaces:
        - "uv sync installs: feedparser, httpx, beautifulsoup4, lxml, github-copilot-sdk"
    - component: rss_sources.py
      responsibility: |
        Fetch articles from 6 RSS feeds using feedparser. Returns a flat list of article
        dicts. Handles network errors per-feed with logged warnings.
      interfaces:
        - "fetch_rss_articles() -> list[dict]"
        - "Dict schema: {source: str, title: str, url: str, published: str, content_snippet: str}"
    - component: scrape_sources.py
      responsibility: |
        Scrape 2 sites without public RSS (Anthropic, Mistral) using httpx + BeautifulSoup4.
        Returns same dict schema as rss_sources for uniform downstream use. xAI and Meta AI
        are excluded: xAI returns HTTP 403 (CDN/WAF), Meta AI is a pure JS SPA. If any
        remaining source returns empty content or 4xx, logs warning and continues — never crashes.
      interfaces:
        - "fetch_scraped_articles() -> list[dict]"
        - "Dict schema: same 5-key schema as rss_sources output"
    - component: llm.py
      responsibility: |
        Wrap the GitHub Copilot SDK (CopilotClient) with an async summarise() function.
        Creates a new Copilot session per call (or per run), sends the Ugg caveman prompt,
        streams AssistantMessageData events until SessionIdleData signals completion.
        No API key or env vars required — uses logged-in gh / Copilot CLI credentials.
        Returns fallback string on any exception.
      interfaces:
        - "async def summarise(text: str) -> str"
    - component: fetch.py
      responsibility: |
        Async orchestrator. Calls rss_sources + scrape_sources, deduplicates by URL
        against .seen_urls.json, calls await llm.summarise() per new article, writes the
        output .md file, updates .seen_urls.json, runs git add/commit/push. Entry via
        asyncio.run(main()). No load_dotenv or GITHUB_TOKEN references.
      interfaces:
        - "async def main() — invoked via asyncio.run(main())"
    - component: setup_cron.sh
      responsibility: |
        Idempotent shell script that installs a single crontab entry running fetch.py at
        9:30am daily. Resolves full absolute path to uv. No GITHUB_TOKEN or .env handling
        needed — CopilotClient uses gh credentials automatically. Uses `|| true` in crontab
        install line to handle fresh machines. Redirects stdout+stderr to logs/cron.log.
      interfaces:
        - "Standalone shell script: bash setup_cron.sh"
    - component: README.md
      responsibility: |
        Full user-facing documentation covering prerequisites, setup, manual run, cron
        setup, output format, sources table, deduplication, logs, and troubleshooting.
      interfaces:
        - "Markdown document for human readers"
  dependencies:
    - component: fetch.py
      relationship: imports rss_sources, scrape_sources, llm; async event loop via asyncio
    - component: rss_sources.py
      relationship: depends on feedparser, beautifulsoup4 (for HTML stripping)
    - component: scrape_sources.py
      relationship: depends on httpx, beautifulsoup4, lxml
    - component: llm.py
      relationship: depends on github-copilot-sdk (CopilotClient); no API key dependency
  integration_points:
    - fetch.py integrates all three helper modules via standard Python imports
    - GitHub Copilot API via CopilotClient (github-copilot-sdk) using gh auth credentials
    - macOS crontab integrated via setup_cron.sh shell invocation of crontab command
    - git remote origin integrated via subprocess calls in fetch.py

